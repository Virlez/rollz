<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="52%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#b77912"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="14" fill="#151321"/>
  <g filter="url(#glow)">
    <polygon points="50,8 88,29 88,71 50,92 12,71 12,29" fill="none" stroke="url(#gold)" stroke-width="3.4" stroke-linejoin="round"/>
    <line x1="50" y1="8" x2="12" y2="71" stroke="url(#gold)" stroke-width="2" opacity="0.72"/>
    <line x1="50" y1="8" x2="88" y2="71" stroke="url(#gold)" stroke-width="2" opacity="0.72"/>
    <line x1="12" y1="29" x2="88" y2="29" stroke="url(#gold)" stroke-width="2" opacity="0.72"/>
    <line x1="12" y1="71" x2="88" y2="71" stroke="url(#gold)" stroke-width="2" opacity="0.72"/>
    <line x1="12" y1="29" x2="50" y2="92" stroke="url(#gold)" stroke-width="2" opacity="0.72"/>
    <line x1="88" y1="29" x2="50" y2="92" stroke="url(#gold)" stroke-width="2" opacity="0.72"/>
  </g>
</svg>
