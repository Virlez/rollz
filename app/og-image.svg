<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Rollz social thumbnail</title>
  <desc id="desc">Dark fantasy thumbnail with a gold d20 icon matching the site favicon.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13111d"/>
      <stop offset="100%" stop-color="#0b0a12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="52%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#b77912"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.94  0 1 0 0 0.70  0 0 1 0 0.16  0 0 0 1 0" result="goldGlow"/>
      <feMerge>
        <feMergeNode in="goldGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="36" fill="url(#bg)"/>

  <g opacity="0.16">
    <path d="M0 70H1200M0 140H1200M0 210H1200M0 280H1200M0 350H1200M0 420H1200M0 490H1200M0 560H1200" stroke="#ffffff" stroke-width="1"/>
    <path d="M70 0V630M140 0V630M210 0V630M280 0V630M350 0V630M420 0V630M490 0V630M560 0V630M630 0V630M700 0V630M770 0V630M840 0V630M910 0V630M980 0V630M1050 0V630M1120 0V630" stroke="#ffffff" stroke-width="1"/>
  </g>

  <g transform="translate(265 115)">
    <rect x="0" y="0" width="300" height="300" rx="40" fill="#151321" stroke="rgba(240,180,41,0.18)"/>
    <g transform="translate(40 40) scale(2.2)" filter="url(#glow)">
      <polygon points="50,6 90,28 90,72 50,94 10,72 10,28" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round"/>
      <line x1="50" y1="6" x2="10" y2="72" stroke="url(#gold)" stroke-width="2" opacity="0.72"/>
      <line x1="50" y1="6" x2="90" y2="72" stroke="url(#gold)" stroke-width="2" opacity="0.72"/>
      <line x1="10" y1="28" x2="90" y2="28" stroke="url(#gold)" stroke-width="2" opacity="0.72"/>
      <line x1="10" y1="72" x2="90" y2="72" stroke="url(#gold)" stroke-width="2" opacity="0.72"/>
      <line x1="10" y1="28" x2="50" y2="94" stroke="url(#gold)" stroke-width="2" opacity="0.72"/>
      <line x1="90" y1="28" x2="50" y2="94" stroke="url(#gold)" stroke-width="2" opacity="0.72"/>
    </g>
  </g>

  <g transform="translate(615 198)">
    <text x="0" y="0" fill="url(#gold)" font-family="Cinzel, Georgia, serif" font-size="94" font-weight="700" letter-spacing="2">ROLLZ</text>
    <text x="2" y="64" fill="#7c879c" font-family="Inter, Arial, sans-serif" font-size="28" letter-spacing="8">LANCEUR DE DÉS JDR</text>
  </g>
</svg>
