<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0d0a14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="50%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#c8940a"/>
    </linearGradient>
    <linearGradient id="face" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#2a1f3d"/>
      <stop offset="100%" stop-color="#1a1025"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- D20 shape (icosahedron front view) -->
  <g filter="url(#glow)">
    <!-- Outer triangle -->
    <polygon points="32,6 56,46 8,46" fill="url(#face)" stroke="url(#gold)" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- Inner inverted triangle -->
    <polygon points="32,46 44,26 20,26" fill="none" stroke="url(#gold)" stroke-width="1.2" stroke-linejoin="round" opacity="0.7"/>
    <!-- Top edges to inner triangle -->
    <line x1="32" y1="6" x2="20" y2="26" stroke="url(#gold)" stroke-width="1.2" opacity="0.7"/>
    <line x1="32" y1="6" x2="44" y2="26" stroke="url(#gold)" stroke-width="1.2" opacity="0.7"/>
    <!-- Bottom edges to inner triangle -->
    <line x1="8" y1="46" x2="32" y2="46" stroke="url(#gold)" stroke-width="1.2" opacity="0.5"/>
    <line x1="56" y1="46" x2="32" y2="46" stroke="url(#gold)" stroke-width="1.2" opacity="0.5"/>
  </g>
  <!-- "20" text -->
  <text x="32" y="40" text-anchor="middle" font-family="Georgia,serif" font-weight="bold" font-size="16" fill="url(#gold)" letter-spacing="-0.5">20</text>
</svg>
